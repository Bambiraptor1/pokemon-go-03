{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">
  <h1 class="mb-4">Change Password Page</h1>

  <div class="card">
    <div class="card-header">
      <h4 class="mb-0">Update Password</h4>
    </div>

    <div class="card-body">
      <form method="POST">

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Current Password</label>
            <input type="password"
                class="form-control"
                name="current_password"
                required>
          </div>

          <div class="col-md-6">
            <label class="form-label">New Password</label>
            <input type="password"
                class="form-control"
                name="new_password"
                required>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-6">
            <label class="form-label">Confirm New Password</label>
            <input type="password"
                class="form-control"
                name="confirm_password"
                required>
          </div>
        </div>
        <hr>
        <button type="submit" class="btn btn-outline-primary">
          <i class="bi bi-key"></i> Update Password
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
